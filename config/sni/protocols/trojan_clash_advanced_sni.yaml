    proxies:
      - "SCEN-OPEN"
      - "SCEN-CDN"
      - "UDP-BEST"
      - "FAST-ALL"
      - "LB-ALL"
      - "MANUAL"
      - DIRECT

  # ── Scenario groups ───────────────────────────────────────────────────────
  - name: "SCEN-OPEN"
