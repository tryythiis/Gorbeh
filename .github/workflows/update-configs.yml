# ══════════════════════════════════════════════════
#  V2Ray Config Aggregator — GitHub Actions
#  بهینه‌شده برای امنیت، پایداری و عدم مسدودی
# ══════════════════════════════════════════════════

name: Update Configs

# ──────────────────────────────────────────────────
# دسترسی‌ها — فقط حداقل دسترسی لازم
# ──────────────────────────────────────────────────
permissions:
  contents: write
  actions: read

# ──────────────────────────────────────────────────
# زمان‌بندی اجرا
# ──────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0 * * *'

  # دکمه اجرای دستی در تب Actions
  workflow_dispatch:

# ──────────────────────────────────────────────────
# جلوگیری از اجرای همزمان دو نسخه
# اگر اجرای قبلی هنوز تمام نشده، لغو می‌شود
# ──────────────────────────────────────────────────
concurrency:
  group: config-update
  cancel-in-progress: true

# ══════════════════════════════════════════════════
#  مراحل اجرا
# ══════════════════════════════════════════════════
jobs:
  update:
    runs-on: ubuntu-latest

    # حداکثر ۴ ساعت (از ۶ ساعت مجاز گیت‌هاب کمتر)
    timeout-minutes: 240

    steps:

      # ────────────────────────────────────────────
      # مرحله ۱: دانلود کد از مخزن
      # ────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ────────────────────────────────────────────
      # مرحله ۲: نصب Go
      # ────────────────────────────────────────────
      - name: 🔧 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      # ────────────────────────────────────────────
      # مرحله ۳: دانلود و نصب sing-box
      # ────────────────────────────────────────────
      - name: 📦 Install sing-box
        run: |
          SINGBOX_VERSION="1.12.22"
          echo "📦 Downloading sing-box v${SINGBOX_VERSION}..."

          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
          cp "sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box

          echo "✅ sing-box installed:"
          ./sing-box version

          # پاکسازی فایل‌های اضافی
          rm -rf "sing-box-${SINGBOX_VERSION}-linux-amd64"*

      # ────────────────────────────────────────────
      # مرحله ۴: افزایش محدودیت‌های سیستم
      # ────────────────────────────────────────────
      - name: 🔧 Increase system limits
        run: |
          echo "🔧 Configuring system limits..."
          ulimit -n 65535
          ulimit -u 4096
          echo "  ✅ File descriptors: $(ulimit -n)"
          echo "  ✅ Max processes: $(ulimit -u)"

      # ────────────────────────────────────────────
      # مرحله ۵: دانلود وابستگی‌ها و Build
      # ────────────────────────────────────────────
      - name: 🔨 Build aggregator
        run: |
          echo "📥 Downloading dependencies..."
          export GOPROXY=https://goproxy.io,direct
          go mod tidy

          echo "🔨 Building..."
          go build -ldflags="-s -w" -o aggregator main.go

          echo "✅ Build complete"
          ls -lh aggregator

      # ────────────────────────────────────────────
      # مرحله ۶: اجرای برنامه اصلی
      # ────────────────────────────────────────────
      - name: 🚀 Run aggregator
        run: |
          echo "🚀 Starting V2Ray Config Aggregator..."
          echo "⏰ Start: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          mkdir -p logs
          ./aggregator

          echo ""
          echo "⏰ Finish: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          # به Go بگو فقط از ۲ هسته CPU استفاده کن
          GOMAXPROCS: 2

      # ────────────────────────────────────────────
      # مرحله ۷: بررسی نتایج
      # ────────────────────────────────────────────
      - name: 📊 Verify results
        run: |
          echo "═══════════════════════════════════════"
          echo "  📊 RESULTS SUMMARY"
          echo "═══════════════════════════════════════"

          # تعداد کل کانفیگ‌ها
          if [ -f "config/all_configs.txt" ]; then
            TOTAL=$(wc -l < config/all_configs.txt)
            echo "  ✅ Total valid configs: $TOTAL"
          else
            echo "  ⚠️  No output file found!"
          fi

          echo ""

          # آمار پروتکل‌ها
          echo "  📂 Protocol breakdown:"
          for f in config/protocols/*.txt; do
            if [ -f "$f" ]; then
              NAME=$(basename "$f" .txt)
              COUNT=$(wc -l < "$f")
              echo "     ${NAME}: ${COUNT}"
            fi
          done

          echo ""

          # آمار Clash
          if [ -f "config/clash.yaml" ]; then
            CLASH=$(grep -c '  - name:' config/clash.yaml 2>/dev/null || echo 0)
            echo "  📂 Clash proxies: $CLASH"
          fi

          if [ -f "config/clash_advanced.yaml" ]; then
            ADV=$(grep -c '  - name:' config/clash_advanced.yaml 2>/dev/null || echo 0)
            echo "  📂 Clash advanced proxies: $ADV"
          fi

          echo ""

          # آمار Batch ها
          V2BATCH=$(ls config/batches/v2ray/*.txt 2>/dev/null | wc -l)
          CLBATCH=$(ls config/batches/clash/*.yaml 2>/dev/null | wc -l)
          echo "  📦 V2ray batches: $V2BATCH"
          echo "  📦 Clash batches: $CLBATCH"

          echo ""

          # آمار SNI
          if [ -f "config/sni/all_configs_sni.txt" ]; then
            SNI=$(wc -l < config/sni/all_configs_sni.txt)
            echo "  🔒 SNI configs: $SNI"
          fi

          echo ""

          # حجم فایل‌ها
          echo "  💾 Disk usage:"
          du -sh config/ 2>/dev/null
          du -sh logs/ 2>/dev/null

          echo "═══════════════════════════════════════"

      # ────────────────────────────────────────────
      # مرحله ۸: ذخیره لاگ‌ها (حتی اگر اجرا fail شود)
      # ────────────────────────────────────────────
      - name: 📋 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
          if-no-files-found: warn

      # ────────────────────────────────────────────
      # مرحله ۹: ارسال نتایج به گیت‌هاب
      # ────────────────────────────────────────────
      - name: 📤 Commit and Push
        run: |
          # تنظیم مشخصات git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # دریافت آخرین تغییرات
          git pull origin main --rebase --autostash

          # فقط پوشه config را اضافه کن
          # README.md عمداً اضافه نمی‌شود
          git add config/

          # بررسی وجود تغییرات
          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit"
          else
            # ساخت پیام commit با آمار
            TOTAL=0
            if [ -f config/all_configs.txt ]; then
              TOTAL=$(wc -l < config/all_configs.txt)
            fi

            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

            git commit -m "🔄 Update: ${TOTAL} configs | ${TIMESTAMP}"
            git push origin main

            echo "✅ Pushed ${TOTAL} configs successfully"
          fi
